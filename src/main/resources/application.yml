spring:
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/peerreviewdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: 8080

app:
  jwt:
    secret: "PeerReviewPlatformSuperSecretKey2024ForHmacSha256Algorithm!@#"
    expiration: 86400000
  upload:
    dir: ./uploads

logging:
  level:
    com.peerreview: INFO
    org.springframework.security: WARN
