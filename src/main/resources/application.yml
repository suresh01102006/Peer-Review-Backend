spring:
  # Temporarily removed for build testing
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: "PeerReviewPlatformSuperSecretKey2024ForHmacSha256Algorithm!@#"
    expiration: 86400000
  upload:
    dir: ./uploads

logging:
  level:
    com.peerreview: INFO
    org.springframework.security: WARN
